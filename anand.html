<head>

    <link rel ="stylesheet"href="anand.css">

<body>
    <h1>Rockk Paper Scissors</h1>
    <div class="choices">

            <img src="rock2.png">
        </div>

            <img src="paper.png">
        </div>
        <div class="choice" id="scissors">

            <p id="comp-score">0</p>

        <p id="msg">Play your move</p>
    </div>
 <script src="anand.js"></script>
